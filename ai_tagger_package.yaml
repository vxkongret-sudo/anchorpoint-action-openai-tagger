#Anchorpoint Markup Language
#Predefined Variables: e.g. ${path}
#Environment Variables: e.g. ${MY_VARIABLE}
#Full documentation: https://docs.anchorpoint.app/docs/actions/create-actions

version: "1.0"

action:
  #Must Have Properties
  name: "Claude AI file tagging"

  #Optional Properties
  version: 3
  id: "ap::package::haiku_rename"
  category: "ai"
  type: package
  enable: true
  author: "Hermesis Trismegistus"
  description: Tag files by categories and objects with the help of Anthropic's Claude Haiku. Requires an own API key.

  settings: package_settings.py

  icon:
    path: "icons/haiku-logo.svg"

  actions:
    - ap::haiku_rename::folder
    - ap::haiku_rename::file
    - ap::haiku_rename::file_simple

# Anchorpoint Markup Language
# Predefined Variables: e.g. ${path}
# Environment Variables: e.g. ${MY_VARIABLE}
# Full documentation: https://docs.anchorpoint.app/Actions/Reference

version: 1.0

action:
  name: "Tag File Content with AI"

  version: 1
  id: "ap::haiku_rename::file"
  category: "ai"
  type: python
  author: "Hermesiss"
  description: "Creates AI-based tags on selected files by uploading proxy files to Claude"
  enable: true
  icon:
    path: icons/tagImage.svg

  python_packages:
  - pillow

  script: "tag_file_ai.py"
  settings: "package_settings.py"

  register:
    file:
      enable: true
    folder:
      enable: true
